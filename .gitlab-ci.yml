# DinD service is required for Testcontainers
services:
  - docker:dind

variables:
  # Instruct Testcontainers to use the daemon of DinD.
  DOCKER_HOST: "tcp://docker:2375"
  # Improve performance with overlayfs.
  DOCKER_DRIVER: overlay2
  ANDROID_COMPILE_SDK: "29"
  ANDROID_BUILD_TOOLS: "29.0.2"
  ANDROID_SDK_TOOLS:   "6200805"

stages:
- build
- check-releasable
- sonar

build:compile-only:
  image: maven:3.6-openjdk-11
  stage: build
  when: manual
  script:
    - mvn clean package -Dmaven.test.skip
  tags:
    - docker

build:with-tests:
  image: maven:3.6-openjdk-11
  stage: build
  script:
    - mvn clean package
  except:
    - /^master.*$/
    - /^release\/.*$/
    - schedules
  tags:
    - docker

build:android-debug:
  stage: build
  when: manual
  script:
    - apt-get --quiet update --yes
    - apt-get --quiet install --yes wget tar unzip lib32stdc++6 lib32z1
    - wget --output-document=android-sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
    - unzip -d android-sdk-linux android-sdk.zip
    - echo y | android-sdk-linux/tools/bin/sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" >/dev/null
    - echo y | android-sdk-linux/tools/bin/sdkmanager "platform-tools" >/dev/null
    - echo y | android-sdk-linux/tools/bin/sdkmanager "build-tools;${ANDROID_BUILD_TOOLS}" >/dev/null
    - export ANDROID_HOME=$PWD/android-sdk-linux
    - export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/
    - chmod +x fishola-mobile/android/gradlew
    # temporarily disable checking for EPIPE error and use yes to accept all licenses
    - set +o pipefail
    - yes | android-sdk-linux/tools/bin/sdkmanager --licenses
    - set -o pipefail
    - cd fishola-mobile/android
    - ./gradlew assembleDebug
  artifacts:
    paths:
      - fishola-mobile/android/app/build/outputs/
  tags:
    - android

build:ios-debug:
  stage: build
  when: manual
  script:
    - cd fishola-mobile/ios/App
    - xcodebuild clean -project App.xcodeproj -scheme App | xcpretty
    - pod install
    - xcodebuild -scheme 
  #  - xcodebuild clean archive -archivePath build/App -scheme App
  #  - xcodebuild -exportArchive -exportFormat ipa -archivePath "build/App.xcarchive" -exportPath "build/App.ipa" -exportProvisioningProfile "fr.inrae.fishola"
  tags:
    - ios

