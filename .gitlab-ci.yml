include:
  - project: "codelutin/ci"
    file: "/ci.yml"

variables:
  # Improve performance with overlayfs.
  DOCKER_DRIVER: overlay2
  ANDROID_COMPILE_SDK: "29"
  ANDROID_BUILD_TOOLS: "29.0.3"
  ANDROID_SDK_TOOLS: "6200805"
  MAVEN_REPO_PATH: "/var/local/shared-m2-repository"
  MAVEN_OPTS: "-Dmaven.repo.local=${MAVEN_REPO_PATH}"

stages:
  - build
  - package
  - deploy
  - check-releasable
  - sonar

build:compile:
  image: maven:3.8-openjdk-17
  stage: build
  services:
    # DinD service is required for Testcontainers
    - docker:dind
  variables:
    # Instruct Testcontainers to use the daemon of DinD.
    DOCKER_HOST: "tcp://docker:2375"
  artifacts:
    name: "fishola-$CI_COMMIT_SHORT_SHA"
    paths:
      - fishola-backend/target/quarkus-app
      - fishola-mobile/target/dist-demo
      - fishola-mobile/target/dist-mobile
      - fishola-mobile/target/dist-web
      - fishola-admin/target/dist-demo
      - fishola-admin/target/dist-production
    expire_in: 2 hours
  cache:
    paths:
      - fishola-mobile/node
      - fishola-mobile/node_modules
  script:
    - mvn clean package
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule" && $CI_COMMIT_TAG =~ "/^$/"'
      when: always
  tags:
    - sticky
    - docker

build:compile-stable:
  image: maven:3.8-openjdk-17
  stage: build
  services:
    # DinD service is required for Testcontainers
    - docker:dind
  variables:
    # Instruct Testcontainers to use the daemon of DinD.
    DOCKER_HOST: "tcp://docker:2375"
  artifacts:
    name: "fishola-$CI_COMMIT_SHORT_SHA"
    paths:
      - fishola-backend/target/quarkus-app
      - fishola-mobile/target/dist-demo
      - fishola-mobile/target/dist-mobile
      - fishola-mobile/target/dist-web
      - fishola-admin/target/dist-demo
      - fishola-admin/target/dist-production
    expire_in: 2 weeks
  cache:
    paths:
      - fishola-mobile/node
      - fishola-mobile/node_modules
  script:
    - mvn clean package
  rules:
    - if: $CI_COMMIT_TAG
      when: always
  tags:
    - sticky
    - docker

# must be run after the build stage
package:android-demo:
  image: openjdk:11.0-jdk
  stage: package
  when: manual
  cache:
    paths:
      - fishola-mobile/node
      - fishola-mobile/node_modules
  script:
    - apt-get --quiet update --yes
    - apt-get --quiet install --yes wget tar unzip lib32stdc++6 lib32z1
    - wget --output-document=android-sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
    - unzip -d android-sdk-linux android-sdk.zip
    - export ANDROID_HOME=$PWD/android-sdk-linux
    - echo y | android-sdk-linux/tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} "platforms;android-${ANDROID_COMPILE_SDK}" >/dev/null
    - echo y | android-sdk-linux/tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} "platform-tools" >/dev/null
    - echo y | android-sdk-linux/tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} "build-tools;${ANDROID_BUILD_TOOLS}" >/dev/null
    - export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/
    - chmod +x fishola-mobile/android/gradlew
    # temporarily disable checking for EPIPE error and use yes to accept all licenses
    - set +o pipefail
    - yes | android-sdk-linux/tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} --licenses
    - set -o pipefail
    - cd fishola-mobile
    - mv target/dist-demo target/dist
    - ./node/node node/node_modules/npm/bin/npx-cli.js cap copy
    - cd android
    - cat ${KEYSTORE_FISHOLA_JKS} | base64 -d > keystore-fishola.jks
    - cat ${SIGNING_CONFIG} > app/signin.properties
    - ./gradlew clean
    - ./gradlew assembleDemo
    - cp app/build/outputs/apk/demo/release/*.apk ../../
  artifacts:
    name: "fishola-android-demo-$CI_COMMIT_SHORT_SHA"
    paths:
      - ./*.apk
    expire_in: 2 hours
  tags:
    - sticky

# must be run after the build stage
package:android-production:
  image: openjdk:11.0-jdk
  stage: package
  rules:
    - if: $CI_COMMIT_TAG
  cache:
    paths:
      - fishola-mobile/node
      - fishola-mobile/node_modules
  script:
    - apt-get --quiet update --yes
    - apt-get --quiet install --yes wget tar unzip lib32stdc++6 lib32z1
    - wget --output-document=android-sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
    - unzip -d android-sdk-linux android-sdk.zip
    - export ANDROID_HOME=$PWD/android-sdk-linux
    - echo y | android-sdk-linux/tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} "platforms;android-${ANDROID_COMPILE_SDK}" >/dev/null
    - echo y | android-sdk-linux/tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} "platform-tools" >/dev/null
    - echo y | android-sdk-linux/tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} "build-tools;${ANDROID_BUILD_TOOLS}" >/dev/null
    - export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/
    - chmod +x fishola-mobile/android/gradlew
    # temporarily disable checking for EPIPE error and use yes to accept all licenses
    - set +o pipefail
    - yes | android-sdk-linux/tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} --licenses
    - set -o pipefail
    - cd fishola-mobile
    - mv target/dist-mobile target/dist
    - ./node/node node/node_modules/npm/bin/npx-cli.js cap copy
    - cd android
    - cat ${KEYSTORE_FISHOLA_JKS} | base64 -d > keystore-fishola.jks
    - cat ${SIGNING_CONFIG} > app/signin.properties
    - ./gradlew clean
    - ./gradlew assembleProduction
    - cp app/build/outputs/apk/production/release/*.apk ../../
  artifacts:
    name: "fishola-android-$CI_COMMIT_SHORT_SHA"
    paths:
      - ./*.apk
    expire_in: 2 weeks
  tags:
    - sticky

package:docker-demo:
  image: registry.nuiton.org/codelutin/dockerfiles:docker
  stage: package
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE != "schedule"'
      when: always
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.nuiton.org
    - docker build --no-cache --file fishola-backend/src/main/docker/Dockerfile.demo -t registry.nuiton.org/inrae/fishola:backend-demo fishola-backend
    - docker build --no-cache --file fishola-mobile/docker/Dockerfile.demo -t registry.nuiton.org/inrae/fishola:web-demo fishola-mobile
    - docker build --no-cache --file fishola-admin/docker/Dockerfile.demo -t registry.nuiton.org/inrae/fishola:admin-demo fishola-admin
    - docker push registry.nuiton.org/inrae/fishola
    - docker logout registry.nuiton.org
  tags:
    - docker

package:docker-opencv:
  image: registry.nuiton.org/codelutin/dockerfiles:docker
  stage: package
  rules:
    - if: '$CI_COMMIT_BRANCH == "feature/opencv.js" && $CI_PIPELINE_SOURCE != "schedule"'
      when: always
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.nuiton.org
    - docker build --no-cache --file fishola-backend/src/main/docker/Dockerfile.demo -t registry.nuiton.org/inrae/fishola:backend-opencv fishola-backend
    - docker build --no-cache --file fishola-mobile/docker/Dockerfile.demo -t registry.nuiton.org/inrae/fishola:web-opencv fishola-mobile
    - docker build --no-cache --file fishola-admin/docker/Dockerfile.demo -t registry.nuiton.org/inrae/fishola:admin-opencv fishola-admin
    - docker push registry.nuiton.org/inrae/fishola
    - docker logout registry.nuiton.org
  tags:
    - docker

package:docker-demo-feature:
  image: registry.nuiton.org/codelutin/dockerfiles:docker
  stage: package
  rules:
    - if: '$CI_COMMIT_BRANCH != "develop"'
      when: manual
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.nuiton.org
    - docker build --no-cache --file fishola-backend/src/main/docker/Dockerfile.demo -t registry.nuiton.org/inrae/fishola:backend-demo-${CI_COMMIT_REF_NAME#feature/} fishola-backend
    - docker build --no-cache --file fishola-mobile/docker/Dockerfile.demo -t registry.nuiton.org/inrae/fishola:web-demo-${CI_COMMIT_REF_NAME#feature/} fishola-mobile
    - docker build --no-cache --file fishola-admin/docker/Dockerfile.demo -t registry.nuiton.org/inrae/fishola:admin-demo-${CI_COMMIT_REF_NAME#feature/} fishola-admin
    - docker push registry.nuiton.org/inrae/fishola
    - docker logout registry.nuiton.org
  tags:
    - docker

deploy:demo:
  image: alpine:latest
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE != "schedule"'
      when: always
  dependencies:
    - package:docker-demo
  script:
    - wget -O- https://webhooks.demo.codelutin.com/redeploy-fishola-demo

sonarqube:
  image: maven:3.8-openjdk-17
  stage: sonar
  when: manual
  services:
    # DinD service is required for Testcontainers
    - docker:dind
  variables:
    # Instruct Testcontainers to use the daemon of DinD.
    DOCKER_HOST: "tcp://docker:2375"
  script:
    - mvn -e -U clean verify -DskipRelease org.sonarsource.scanner.maven:sonar-maven-plugin:$MAVEN_SONAR_PLUGIN_VERSION:sonar -Dsonar.host.url="$SONAR_INSTANCE_URL" -Dsonar.projectKey=fr.inrae:fishola -Dsonar.exclusions='**/js/libs/*','**/target/*','**/generated*/*'
  tags:
    - docker
