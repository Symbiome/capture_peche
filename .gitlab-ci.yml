include:
  - project: codelutin/ci
    file: ci.yml

variables:
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_SDK_TOOLS: "6858069"

stages:
  - build
  - package
  - package_mobile
  - deploy
  - check-releasable
  - sonar

build:compile:
  image: maven:3.8-eclipse-temurin-17
  stage: build
  artifacts:
    name: "fishola-$CI_COMMIT_SHORT_SHA"
    paths:
      - fishola-backend/target/quarkus-app
      - fishola-mobile/target/dist-demo
      - fishola-mobile/target/dist-mobile
      - fishola-mobile/target/dist-web
      - fishola-admin/target/dist-demo
      - fishola-admin/target/dist-production
    expire_in: 2 weeks
  cache:
    paths:
      - fishola-mobile/node
      - fishola-mobile/node_modules
  script:
    - mvn clean package
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(?:master|develop)/
    - if: $CI_COMMIT_BRANCH =~ /^(?:master|develop)/
    - if: $CI_COMMIT_TAG
  tags:
    - sticky

package:docker-demo:
  image: docker:20
  stage: package
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE != "schedule"'
      when: always
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --file fishola-backend/src/main/docker/Dockerfile.demo -t $CI_REGISTRY_IMAGE:backend-demo fishola-backend
    - docker build --file fishola-mobile/docker/Dockerfile.demo -t $CI_REGISTRY_IMAGE:web-demo fishola-mobile
    - docker build --file fishola-admin/docker/Dockerfile.demo -t $CI_REGISTRY_IMAGE:admin-demo fishola-admin
    - docker push $CI_REGISTRY_IMAGE:backend-demo
    - docker push $CI_REGISTRY_IMAGE:web-demo
    - docker push $CI_REGISTRY_IMAGE:admin-demo
    - docker logout $CI_REGISTRY
  tags:
    - docker

package:docker-demo-feature:
  image: docker:20
  stage: package
  rules:
    - if: '$CI_COMMIT_BRANCH != "develop"'
      when: manual
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --file fishola-backend/src/main/docker/Dockerfile.demo -t $CI_REGISTRY_IMAGE:backend-demo-${CI_COMMIT_REF_NAME#feature/} fishola-backend
    - docker build --file fishola-mobile/docker/Dockerfile.demo -t $CI_REGISTRY_IMAGE:web-demo-${CI_COMMIT_REF_NAME#feature/} fishola-mobile
    - docker build --file fishola-admin/docker/Dockerfile.demo -t $CI_REGISTRY_IMAGE:admin-demo-${CI_COMMIT_REF_NAME#feature/} fishola-admin
    - docker push $CI_REGISTRY_IMAGE:backend-demo-${CI_COMMIT_REF_NAME#feature/}
    - docker push $CI_REGISTRY_IMAGE:web-demo-${CI_COMMIT_REF_NAME#feature/}
    - docker push $CI_REGISTRY_IMAGE:admin-demo-${CI_COMMIT_REF_NAME#feature/}
    - docker logout $CI_REGISTRY
  tags:
    - docker

deploy:demo:
  image: alpine:latest
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE != "schedule"'
      when: always
  dependencies:
    - package:docker-demo
  script:
    - wget -O- https://webhooks.demo.codelutin.com/redeploy-fishola-demo

sonarqube:
  image: maven:3.8-eclipse-temurin-17
  stage: sonar
  when: manual
  script:
    - mvn -e -U clean verify -DskipRelease org.sonarsource.scanner.maven:sonar-maven-plugin:$MAVEN_SONAR_PLUGIN_VERSION:sonar -Dsonar.host.url="$SONAR_INSTANCE_URL" -Dsonar.projectKey=fr.inrae:fishola -Dsonar.exclusions='**/js/libs/*','**/target/*','**/generated*/*'
  tags:
    - docker

package:android-demo:
  image: eclipse-temurin:17-noble
  stage: package_mobile
  before_script:
    - cd fishola-mobile
    - echo "en_US UTF-8" > /etc/locale.gen
    - locale-gen en_US.UTF-8
    - export LANG=en_US.UTF-8
    - export LANGUAGE=en_US:en
    - export LC_ALL=en_US.UTF-8
    - apt-get --quiet update --yes
    - apt-get --quiet install --yes wget tar unzip lib32stdc++6 lib32z1 ruby ruby-dev git build-essential python3 python3-pip libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
    - wget -qO- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
    - export NVM_DIR="$HOME/.nvm"
    - source $NVM_DIR/nvm.sh
    - nvm install 22
    - nvm use 22
    - gem install bundler
    - bundle install
    - wget --output-document=android-sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
    - unzip -d android-sdk-linux android-sdk.zip
    - export ANDROID_HOME=$PWD/android-sdk-linux
    - echo y | android-sdk-linux/cmdline-tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} "platforms;android-${ANDROID_COMPILE_SDK}" >/dev/null
    - echo y | android-sdk-linux/cmdline-tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} "platform-tools" >/dev/null
    - echo y | android-sdk-linux/cmdline-tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} "build-tools;${ANDROID_BUILD_TOOLS}" >/dev/null
    - export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/
    - chmod +x android/gradlew
    # temporarily disable checking for EPIPE error and use yes to accept all licenses
    - set +o pipefail
    - yes | android-sdk-linux/cmdline-tools/bin/sdkmanager --sdk_root=${ANDROID_HOME} --licenses
    - set -o pipefail
  script:
    - npm ci
    - npm install --global @capacitor/cli
    - rm -f target/dist
    - cp -r target/dist-demo target/dist
    - npx cap sync
    - cd android
    - cat ${KEYSTORE_FISHOLA_JKS} | base64 -d > keystore-fishola.jks
    - cat ${SIGNING_CONFIG} > app/signin.properties
    - cat ${SIGNING_CONFIG} > app/signin.properties
    - bundle exec fastlane android build_prod_apk                                                                                                                                                                                                      ─╯
    - cp app/build/outputs/apk/production/release/*.apk ../../
  artifacts:
    name: "fishola-android-demo-$CI_COMMIT_SHORT_SHA"
    paths:
      - ./*.apk
    expire_in: 2 hours
  tags:
    - sticky

