deploy:ios-deploy-testflight:
  image: node:22-alpine3.21
  stage: deploy
  when: manual
  tags:
    - ios
  script:
    - export LANG=en_US.UTF-8
    - export LANGUAGE=en_US:en
    - export LC_ALL=en_US.UTF-8
    - cd fishola-mobile
    - npm ci
    - cp -r target/dist-mobile target/dist
    - npx cap sync
    - cd ios/App
    - pod install
    - fastlane ios beta
  artifacts:
    name: "fishola-ios-$CI_COMMIT_SHORT_SHA"
    paths:
      - ./*.ipa