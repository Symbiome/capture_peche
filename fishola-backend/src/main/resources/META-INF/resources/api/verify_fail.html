<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Chrome, Firefox OS and Opera -->
    <meta name="theme-color" content="#1E9BC4">
    <!-- Windows Phone -->
    <meta name="msapplication-navbutton-color" content="#1E9BC4">
    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-status-bar-style" content="#1E9BC4">
    <link rel="stylesheet" href="backend.css">
    <title>Bienvenue sur Fishola</title>
</head>

<body>
    <noscript>
        <strong>We're sorry but fishola doesn't work properly without JavaScript enabled. Please enable it to
            continue.</strong>
    </noscript>
    <div id="app" class="full-background">
        <div class="verified-page">
            <div class="welcome-title">
                <div class="welcome">Bienvenue sur</div>
                <img class="logo" src="logo-big.svg" alt="Fishola" />
            </div>
            <div class="message failed">
                <p>Une erreur est survenue pendant la vérification de votre email.</p>
                <p>Merci de recommencer votre inscription.</p>
            </div>
            <div class="welcome-apps">
                <img class="app" src="GooglePlay.png" alt="GooglePlay" />
                <img class="app" src="AppStore.png" alt="AppStore" />
            </div>

        </div>
    </div>
</body>

</html>
