%test.quarkus.datasource.url=jdbc:tc:postgresql:12:///dbname?TC_TMPFS=/testtmpfs:rw
%test.quarkus.datasource.username=user
%test.quarkus.datasource.password=password
%test.quarkus.datasource.driver=org.testcontainers.jdbc.ContainerDatabaseDriver


# Propriétés obligatoires

%test.fishola.version=%(project.version)
%test.fishola.git-revision=%(git.commit.id.describe)
%test.fishola.build-date=%(maven.build.timestamp)
%test.quarkus.http.cors=true
%test.quarkus.log.category."fr.inrae".level=DEBUG
%test.quarkus.datasource.min-size=3
%test.quarkus.datasource.max-size=10
%test.fishola.feedback-mail-to=fishola-lutins@list.forge.codelutin.com
%test.fishola.smtp-host=localhost
%test.fishola.smtp-port=25
%test.fishola.jwt-secret=whatever

fishola.async-emails-every=600s
