apply plugin: 'com.android.application'

android {
    namespace = "fr.inrae.fishola"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "fr.inrae.fishola"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode versCode as Integer
        versionName versName
        testInstrumentationRunner "androidx.test.runner.AndroixoJUnitRunner"
        resValue "string", "DEEP_LINK_URL", "fishola.demo.codelutin.com"
    }
    signingConfigs {
        signing {
            def Properties signinProps = new Properties()
            signinProps.load(new FileInputStream(file('./signin.properties')))
            storeFile file(signinProps["RELEASE_STORE_FILE"])
            keyAlias signinProps["RELEASE_KEY_ALIAS"]
            storePassword signinProps["RELEASE_STORE_PASSWORD"]
            keyPassword signinProps["RELEASE_KEY_PASSWORD"]

            // Optional, specify signing versions used
            v1SigningEnabled true
            v2SigningEnabled true
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.signing
            applicationVariants.all { variant ->
                variant.outputs.each { output ->
                    def versionName = variant.versionName
                    def versionCode = variant.versionCode
                    def gitRevision = "git rev-parse --short HEAD".execute().text.trim()
                    output.outputFileName = "fishola-v${versionName}-c${versionCode}-r${gitRevision}.apk"
                }
            }
        }
    }
    flavorDimensions "version"
    productFlavors {
        demo {
            // Assigns this product flavor to the "version" flavor dimension.
            // If you are using only one dimension, this property is optional,
            // and the plugin automatically assigns all the module's flavors to
            // that dimension.
            dimension "version"
            versionNameSuffix "-demo"
            resValue "string", "DEEP_LINK_URL", "fishola.demo.codelutin.com"
        }
        beta {
            dimension "version"
            versionNameSuffix "-beta"
            resValue "string", "DEEP_LINK_URL", "fishola-beta.demo.codelutin.com"
        }
        production {
            dimension "version"
            versionNameSuffix ""
            resValue "string", "DEEP_LINK_URL", "api-fishola.inrae.fr"
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.warn("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
