<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <!-- Chrome, Firefox OS and Opera -->
    <meta name="theme-color" content="#1E9BC4">
    <!-- Windows Phone -->
    <meta name="msapplication-navbutton-color" content="#1E9BC4">
    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-status-bar-style" content="#1E9BC4">
    <meta name="keywords" content="FISHOLA,Pêche,Léman,Annecy,Bourget,Aiguebelette,Sciences participatives,Carnet de pêche"/>
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title>FISHOLA</title>
  </head>
  <body style="overflow-y:scroll;overflow-x:scroll;">
    <noscript>
      <strong>FISHOLA est l'application pour une gestion durable de la pêche sur les lacs alpins (Léman, lacs d’Annecy, du Bourget et d’Aiguebelette).</strong>
    </noscript>
    <!--<div id="app"></div>-->
    Lefmost object size(mm)
    <input type="text"  style="width:100px"  id="leftSizeObjectSizeMm" value="133"/>
    Resize image size
    <input type="text"  style="width:100px"  id="fixedSize" value="150"/><br/>
    Min % of detected forms (between 0 and 1)
    <input type="text" style="width:100px" id="minCoverrage" value="0.15"/>
    <br/>
    <div class="inputoutput">
      <img style="display:none" id="imageSrc" alt="No Image" />
      <div class="caption">imageSrc <input type="file" id="fileInput" name="file" /></div>
    </div>
    <p id="status">OpenCV.js is loading...</p>
    <div class="inputoutput">
      <div style="float:left;background-color:yellow;">
          <canvas  id="canvasOutput1" ></canvas><br/>
          <caption>Photo originale</caption>
      </div>
      <div style="clear:both"/>
        <div style="float:left;background-color:green;">
          <canvas  id="canvasOutput2" ></canvas><br/>
          <caption>Photo traitée</caption>
      </div>

      <div style="clear:both"/>
      <div style="float:left;background-color:green;">
          <canvas  id="canvasOutput3" ></canvas><br/>
          <caption>Calcul</caption>
      </div>
    </div>
    <!-- built files will be auto injected -->
    <!-- Link open cv-->
    <script src="js/fish-analyser.js" type="text/javascript"></script>
    <script src="js/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
  </body>
</html>
